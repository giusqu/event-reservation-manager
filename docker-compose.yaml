services:
  db:
    image: postgres:15
    container_name: db_app
    command: -p 1221
    expose:
      - 1221
    env_file:
      - deploy.env

  redis:
    image: redis:7
    container_name: redis_app
    command: --port 5370
    expose:
      - 5370
    env_file:
      - deploy.env

  app:
    build:
      context: .
    env_file:
      - deploy.env
    container_name: erm_app
    command: ["/deploy/app.sh"]
    ports:
      - "9999:8000"
    depends_on:
      - db
      - redis
